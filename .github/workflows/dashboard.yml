name: Revenue Dashboard

on:
  schedule:
    - cron: "0 */4 * * *"  # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout all income repos
        run: |
          for repo in hermes-make-money hermes-deal-finder hermes-seo-farm hermes-lead-magnet hermes-content-recycle hermes-shortsgen pixabay-shorts-bot; do
            if [ ! -d "../$repo" ]; then
              git clone --depth 1 "https://github.com/slashman413/$repo.git" "../$repo" 2>/dev/null || true
            fi
          done

      - name: Sync real revenue log from hermes-pay
        run: |
          # Canonical webhook-sourced revenue lives in hermes-pay/data/revenue.json.
          # Pull it in so the cockpit reflects REAL Ko-fi/Gumroad payments, not a stale copy.
          # If hermes-pay is private, add a PAT with repo:read as secret HERMES_PAY_TOKEN.
          if [ ! -d "../hermes-pay" ]; then
            if [ -n "${{ secrets.HERMES_PAY_TOKEN }}" ]; then
              git clone --depth 1 "https://x-access-token:${{ secrets.HERMES_PAY_TOKEN }}@github.com/slashman413/hermes-pay.git" "../hermes-pay" 2>/dev/null || true
            else
              git clone --depth 1 "https://github.com/slashman413/hermes-pay.git" "../hermes-pay" 2>/dev/null || true
            fi
          fi
          if [ -f "../hermes-pay/data/revenue.json" ]; then
            mkdir -p data
            cp "../hermes-pay/data/revenue.json" data/revenue.json
            echo "synced revenue.json ($(wc -c < data/revenue.json) bytes)"
          else
            echo "NOTE: hermes-pay/data/revenue.json unreachable (private repo needs HERMES_PAY_TOKEN, or webhook host has not pushed yet). Dashboard will show \$0 booked."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dashboard
        run: python scripts/dashboard.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Commit data
        run: |
          git config user.name "Massor"
          git config user.email "slashman413@gmail.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "auto: revenue dashboard update"
          git push

  notify-failure:
    needs: [dashboard]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
